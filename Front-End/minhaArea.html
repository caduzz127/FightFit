<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/styleGlobal.css">
    <script src="assets/js/guardarInformacoes.js" defer></script>
    <script src="assets/js/exibirTreinos"></script>
</head>

<body>
    <header>
        <div class="div-container">
            <div class="logo">
                <div class="logo-text"><a href="telaPrincipal.html">FitFighter</a></div>
            </div>
            <nav class="nav" id="nav">
                <ul class="nav-menu">
                    <li><a href="minhaArea.html">MINHA ÁREA</a></li>
                    <li><a href="telaGrupo.html">GRUPOS</a></li>
                    <li><a href="telaSobre.html">SOBRE NÓS</a></li>
                </ul>
            </nav>
            <div class="div-actions">
                <button class="hamburguer" id="hamburguer" aria-label="menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>

            <div class="div-perfil">
                <img src="assets/imgs/do-utilizador (1).png" alt="Imagem do usuário" width="32px">
                <p id="nomeUsuario" class="nomeUsuarios"></p>
            </div>
        </div>
    </header>

    <main class="content">
        <section>
            <h2>Meus Treinos</h2>
            <div id="treinosContainer">Carregando...</div>
        </section>
    </main>








</body>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('treinosContainer');
        const url = 'http://localhost:8080/fightFit/buscarTreino';
        if (!container) return;
        container.textContent = 'Carregando...';

        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                container.innerHTML = '';
                if (!data || (Array.isArray(data) && data.length === 0)) {
                    container.textContent = 'Nenhum treino encontrado.';
                    return;
                }

                const treinos = Array.isArray(data) ? data : [data];
                treinos.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'treino-card';

                    const title = document.createElement('h3');
                    title.textContent = t.nome || t.titulo || 'Treino';
                    card.appendChild(title);

                    if (t.descricao) {
                        const desc = document.createElement('p');
                        desc.textContent = t.descricao;
                        card.appendChild(desc);
                    }

                    const meta = document.createElement('p');
                    const parts = [];
                    if (t.duracao) parts.push('Duração: ' + t.duracao);
                    if (t.nivel) parts.push('Nível: ' + t.nivel);
                    meta.textContent = parts.join(' • ');
                    if (meta.textContent) card.appendChild(meta);

                    container.appendChild(card);
                });
            })
            .catch(err => {
                console.error('Erro ao buscar treinos:', err);
                container.textContent = 'Erro ao carregar treinos.';
            });
    });
</script>

<script src="assets/js/menu.js"></script>

</html>
