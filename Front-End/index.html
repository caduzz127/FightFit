<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFighter — Página Login</title>
    <link rel="stylesheet" href="assets/css/login.css">
    <script src="assets/js/usuario/validarLogin.js" defer></script>
</head>


<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Fit<span>Fighter</span></h1>
            <p>Seu Marcador Fitness</p>
        </div>
        <h2>Faça o Login</h2>
        <form id="loginForm" onsubmit="fazerLogin(event)">
            <div>
                <label for="email">Usuário:</label>
                <input type="text" id="nome" name="email" placeholder="Usuário" required>
            </div>

            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit">Entrar</button>
        </form>
        <div class="login-footer">
            <p>Não tem conta? <a href="telaCadastro.html">Crie uma aqui</a></p>
        </div>
    </div>




</body>

</html>
