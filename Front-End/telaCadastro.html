<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFighter - Login</title>
    <link rel="stylesheet" href="assets/css/login.css">
    <script src="assets/js/cadastrarUsuario.js" defer></script>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Fit<span>Fighter</span></h1>
            <p>Seu Marcador Fitness</p>
        </div>
        <h2>Cadastrar Usuário</h2>
        <form  onsubmit="fazerCadastro(event)">
            <div>
                <label for="nome">Nome De Usuário:</label>
                <input type="text" id="nomeCadastro" name="nome" placeholder="Nome:" required autocomplete="name">
            </div>
            
            <div>
                <label for="senha">Senha:</label>
                <input type="password" id="senhaCadastro" name="senha" placeholder="Digite sua senha" required autocomplete="new-password">
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <div class="login-footer">
            <p>Deseja entrar? <a href="index.html">Entre aqui</a></p>
        </div>
    </div>
    <script src="cadastrarUsuario.js"></script>
</body>

</html>
